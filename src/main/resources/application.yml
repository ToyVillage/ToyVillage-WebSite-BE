spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}   # 환경변수로 관리
    password: ${MAIL_PASSWORD}    # 앱 비밀번호
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_REGION}
      s3:
        region: ${AWS_S3_REGION}
        bucket: ${AWS_S3_BUCKET}
      endpoint: ${AWS_ENDPOINT}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

cors:
  allowed-origins:
    local: http://localhost:8080
    dev: ${DEV_URL}
    main: ${MAIN_URL}

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

jwt:
  secret-key: ${SECRET_KEY}
  accessExpiration: 3600000
  refreshExpiration: 604800000

  header: Authorization
  prefix: Bearer

app:
  cookie:
    secure: false # 테스트 환경에선 false, 운영 환경에선 https를 사용함, 따라서 true로 바꾼뒤 운영해야함