spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

cors:
  allowed-origins:
    local: http://localhost:8080
    dev: ${DEV_URL}
    main: ${MAIN_URL}

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

jwt:
  secret-key: ${SECRET_KEY}
  accessExpiration: 3600000
  refreshExpiration: 604800000

  header: Authorization
  prefix: Bearer


app:
  cookie:
    secure: false # 테스트 환경에선 false, 운영 환경에선 https를 사용함, 따라서 true로 바꾼뒤 운영해야함